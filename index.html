<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZSHARAD | Construction & Engineering</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        body { margin: 0; padding: 0; overflow-x: hidden; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useRef, useState } = React;

        function Website() {
            const canvasRef = useRef(null);
            const productCanvasRef = useRef(null);
            const [isVisible, setIsVisible] = useState(false);
            const [scrollY, setScrollY] = useState(0);

            useEffect(() => {
                setIsVisible(true);

                const handleScroll = () => {
                    setScrollY(window.scrollY);
                };
                window.addEventListener('scroll', handleScroll);

                // Hero 3D Background
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({
                    canvas: canvasRef.current,
                    alpha: true,
                    antialias: true
                });

                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

                const geometry = new THREE.TorusGeometry(3, 0.4, 16, 100);
                const material = new THREE.MeshPhysicalMaterial({
                    color: 0x000000,
                    metalness: 0.9,
                    roughness: 0.1,
                    transparent: true,
                    opacity: 0.15,
                    side: THREE.DoubleSide
                });

                const torus = new THREE.Mesh(geometry, material);
                torus.position.set(8, 0, -5);
                scene.add(torus);

                const ambientLight = new THREE.AmbientLight(0xffffff, 1);
                scene.add(ambientLight);
                
                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
                directionalLight.position.set(5, 5, 5);
                scene.add(directionalLight);

                camera.position.z = 10;

                // Product 3D Visualization
                const productScene = new THREE.Scene();
                const productCamera = new THREE.PerspectiveCamera(75, 800 / 600, 0.1, 1000);
                const productRenderer = new THREE.WebGLRenderer({
                    canvas: productCanvasRef.current,
                    alpha: true,
                    antialias: true
                });

                productRenderer.setSize(800, 600);
                productRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

                const sphereGeometry = new THREE.SphereGeometry(2, 32, 32);
                const sphereMaterial = new THREE.MeshPhysicalMaterial({
                    color: 0x000000,
                    metalness: 1,
                    roughness: 0,
                    clearcoat: 1,
                    clearcoatRoughness: 0
                });

                const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
                productScene.add(sphere);

                const productAmbient = new THREE.AmbientLight(0xffffff, 0.5);
                productScene.add(productAmbient);
                
                const productLight = new THREE.DirectionalLight(0xffffff, 1);
                productLight.position.set(5, 5, 5);
                productScene.add(productLight);

                productCamera.position.z = 5;

                let animationId;
                const animate = () => {
                    animationId = requestAnimationFrame(animate);
                    torus.rotation.x += 0.001;
                    torus.rotation.y += 0.002;
                    sphere.rotation.y += 0.003;
                    renderer.render(scene, camera);
                    productRenderer.render(productScene, productCamera);
                };
                animate();

                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('scroll', handleScroll);
                    window.removeEventListener('resize', handleResize);
                    cancelAnimationFrame(animationId);
                    renderer.dispose();
                    productRenderer.dispose();
                };
            }, []);

            return (
                <div className="relative bg-white overflow-hidden">
                    {/* Navigation */}
                    <nav className="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-xl border-b border-gray-100">
                        <div className="max-w-7xl mx-auto px-8 py-4 flex items-center justify-between">
                            <div className="text-2xl font-semibold text-black" style={{ fontFamily: '-apple-system, BlinkMacSystemFont, sans-serif' }}>
                                ZSHARAD
                            </div>
                            <div className="hidden md:flex items-center space-x-10">
                                <a href="#features" className="text-gray-600 hover:text-black transition-colors">Services</a>
                                <a href="#pricing" className="text-gray-600 hover:text-black transition-colors">Products</a>
                                <a href="#security" className="text-gray-600 hover:text-black transition-colors">Why Us</a>
                                <button className="px-6 py-2 bg-black text-white rounded-full hover:scale-105 transition-transform">
                                    Contact
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <div className="relative min-h-screen flex items-center justify-center">
                        <canvas
                            ref={canvasRef}
                            className="fixed inset-0 w-full h-full opacity-40"
                            style={{ pointerEvents: 'none' }}
                        />
                        
                        <div className="relative z-10 max-w-6xl mx-auto px-8 pt-32 text-center">
                            <div className={`transition-all duration-1000 ease-out ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8'}`}>
                                <h1 className="text-[5rem] md:text-[8rem] leading-[0.9] font-semibold tracking-tight mb-8 text-black" style={{ fontFamily: '-apple-system, BlinkMacSystemFont, sans-serif' }}>
                                    Build strong.<br />Build smart.
                                </h1>
                                
                                <p className="text-2xl md:text-3xl text-gray-600 max-w-3xl mx-auto leading-relaxed font-light mb-12">
                                    End‑to‑end construction and engineering solutions using high‑quality metal structures and advanced fabrication techniques.
                                </p>

                                <div className="flex flex-col sm:flex-row items-center justify-center gap-4">
                                    <button className="px-10 py-5 bg-black text-white text-lg font-medium rounded-full hover:scale-105 transition-all duration-300 hover:shadow-2xl">
                                        Get a quote
                                    </button>
                                    <button className="px-10 py-5 text-black text-lg font-medium rounded-full border-2 border-black hover:bg-black hover:text-white transition-all duration-300">
                                        View projects
                                    </button>
                                </div>

                                <p className="mt-8 text-gray-500 text-sm font-light">
                                    Custom steel structure solutions · Project consultation
                                </p>
                            </div>
                        </div>
                    </div>

                    {/* Features Section */}
                    <div id="features" className="max-w-6xl mx-auto px-8 py-32 bg-white relative z-10">
                        <div className="text-center mb-24">
                            <h2 className="text-5xl md:text-6xl font-semibold tracking-tight mb-6 text-black" style={{ fontFamily: '-apple-system, BlinkMacSystemFont, sans-serif' }}>
                                Our core services.
                            </h2>
                            <p className="text-xl text-gray-600 font-light max-w-2xl mx-auto">
                                Comprehensive construction solutions from concept to completion.
                            </p>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-16">
                            {[
                                { 
                                    icon: '🏗️', 
                                    title: 'Construction Services', 
                                    desc: 'Building construction for industrial, commercial & custom projects. Steel structure construction works. Turnkey project execution.' 
                                },
                                { 
                                    icon: '🏭', 
                                    title: 'Assembly & Installation', 
                                    desc: 'Assembly of hot galvanized steel structures. On-site installation of prefabricated buildings. Structural framework erection.' 
                                },
                                { 
                                    icon: '🔧', 
                                    title: 'Maintenance & Repair', 
                                    desc: 'Repair of metal structures. Structural reinforcement & modification. Long-term maintenance services.' 
                                }
                            ].map((feature, i) => (
                                <div key={i} className="transition-all">
                                    <div className="text-5xl mb-6">{feature.icon}</div>
                                    <h3 className="text-2xl font-semibold mb-4 text-black" style={{ fontFamily: '-apple-system, BlinkMacSystemFont, sans-serif' }}>
                                        {feature.title}
                                    </h3>
                                    <p className="text-lg text-gray-600 font-light leading-relaxed">
                                        {feature.desc}
                                    </p>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Divider */}
                    <div className="max-w-6xl mx-auto px-8 bg-white relative z-10"><div className="h-px bg-gray-200" /></div>

                    {/* Product Showcase */}
                    <div className="max-w-6xl mx-auto px-8 py-32 bg-white relative z-10">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-16 items-center">
                            <div>
                                <canvas ref={productCanvasRef} className="w-full h-auto rounded-3xl" />
                            </div>
                            <div>
                                <h2 className="text-5xl font-semibold tracking-tight mb-6 text-black" style={{ fontFamily: '-apple-system, BlinkMacSystemFont, sans-serif' }}>
                                    Durable, high‑performance metal structures.
                                </h2>
                                <p className="text-xl text-gray-600 font-light leading-relaxed mb-8">
                                    We specialize in manufacturing and supplying durable metal structures for construction and industrial applications. From prefabricated buildings to custom fabricated products.
                                </p>
                                <button className="text-black font-medium text-lg hover:underline">
                                    View our offerings →
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Footer */}
                    <footer className="bg-gray-50 py-16 relative z-10 border-t border-gray-200">
                        <div className="max-w-6xl mx-auto px-8 text-center text-gray-600 text-sm">
                            © 2024 ZSHARAD. All rights reserved.
                        </div>
                    </footer>
                </div>
            );
        }

        // Render the React component into the DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Website />);
    </script>
</body>
</html>
