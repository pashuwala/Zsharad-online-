<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZSHARAD | Construction & Engineering</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  html { scroll-behavior: smooth; }
  body { margin: 0; padding: 0; overflow-x: hidden; background-color: #ffffff; color: #000000; }
  .product-3d-wrapper canvas {
    width: 100% !important;
    height: 100% !important;
    max-height: 400px;
    object-fit: contain;
  }
  .glass-nav {
    background-color: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  .ultra-footer {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.8s ease-out, transform 0.8s ease-out;
  }
  .ultra-footer.show {
    opacity: 1;
    transform: translateY(0);
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useEffect, useRef } = React;

function Website() {
  const canvasRef = useRef(null);
  const productCanvasRef = useRef(null);
  const footerRef = useRef(null);

  useEffect(() => {
    // ==========================================
    // 1. HERO GLOBAL ENVIRONMENT 3D CANVAS
    // ==========================================
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({
      canvas: canvasRef.current,
      alpha: true,
      antialias: true
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const geometry = new THREE.TorusGeometry(3.2, 0.35, 16, 100);
    const material = new THREE.MeshPhysicalMaterial({
      color: 0x111111,
      metalness: 0.95,
      roughness: 0.05,
      transparent: true,
      opacity: 0.14,
      side: THREE.DoubleSide
    });
    const torus = new THREE.Mesh(geometry, material);
    torus.position.set(window.innerWidth > 768 ? 4.5 : 0, 0, -1);
    scene.add(torus);

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.4);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 8, 5);
    scene.add(directionalLight);
    camera.position.z = 8;

    // ==========================================
    // 2. PRODUCT INTERACTIVE 3D COMPONENT
    // ==========================================
    const productScene = new THREE.Scene();
    const productCamera = new THREE.PerspectiveCamera(45, 4 / 3, 0.1, 1000);
    const productRenderer = new THREE.WebGLRenderer({
      canvas: productCanvasRef.current,
      alpha: true,
      antialias: true
    });
    productRenderer.setSize(400, 300);
    productRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const sphereGeometry = new THREE.SphereGeometry(1.7, 40, 40);
    const sphereMaterial = new THREE.MeshPhysicalMaterial({
      color: 0x1a1a1a,
      metalness: 1.0,
      roughness: 0.05,
      clearcoat: 1.0,
      clearcoatRoughness: 0.05
    });
    const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
    productScene.add(sphere);

    const productAmbient = new THREE.AmbientLight(0xffffff, 0.9);
    productScene.add(productAmbient);
    const productLight = new THREE.DirectionalLight(0xffffff, 1.6);
    productLight.position.set(6, 6, 6);
    productScene.add(productLight);
    productCamera.position.z = 5;

    // ==========================================
    // 3. ENGINE ANIMATION MANAGEMENT LOOP
    // ==========================================
    let animationId;
    const animate = () => {
      animationId = requestAnimationFrame(animate);
      torus.rotation.x += 0.001;
      torus.rotation.y += 0.0012;
      sphere.rotation.y += 0.004;
      renderer.render(scene, camera);
      productRenderer.render(productScene, productCamera);
    };
    animate();

    // ==========================================
    // 4. RESPONSIVE SCREEN ADAPTATION LOGIC
    // ==========================================
    const handleResize = () => {
      if (!canvasRef.current) return;
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      torus.position.set(window.innerWidth > 768 ? 4.5 : 0, 0, -1);
    };
    window.addEventListener('resize', handleResize);

    // ==========================================
    // 5. FOOTER SCROLL ANIMATION
    // ==========================================
    const handleFooterScroll = () => {
      if (!footerRef.current) return;
      const footerTop = footerRef.current.getBoundingClientRect().top;
      if (footerTop < window.innerHeight - 100) {
        footerRef.current.classList.add('show');
      }
    };
    window.addEventListener('scroll', handleFooterScroll);

    return () => {
      window.removeEventListener('resize', handleResize);
      window.removeEventListener('scroll', handleFooterScroll);
      cancelAnimationFrame(animationId);
      renderer.dispose();
      productRenderer.dispose();
    };
  }, []);

  return (
    <div className="relative bg-white w-full min-h-screen font-sans antialiased selection:bg-black selection:text-white">

            <a href="aboutus.html" className="text-gray-600 hover:text-black transition-colors font-medium text-sm">About Us</a>
            <a href="#why-us" className="text-gray-600 hover:text-black transition-colors font-medium text-sm">Why Us</a>
            <a href="#offerings" className="text-gray-600 hover:text-black transition-colors font-medium text-sm">Products</a>
            <a href="mailto:info.zonato@gmail.com" className="px-6 py-2.5 bg-black text-white text-xs font-semibold rounded-full hover:bg-gray-800 transition-all tracking-wide">
              CONNECT WITH US
            </a>
          </div>
        </div>
      </nav>

      {/* Hero Section */}

            </h1>
            <p className="text-xl md:text-2xl text-gray-600 max-w-2xl font-light leading-relaxed mb-12">

          <div className="grid grid-cols-1 md:grid-cols-2 gap-12 items-center mb-16">

            </div>
            <div className="order-1 md:order-2 rounded-3xl overflow-hidden shadow-2xl border border-gray-100 bg-sky-400">
              <svg viewBox="0 0 800 600" className="w-full h-auto block">
                <defs>
                  <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style={{ stopColor: '#38bdf8' }} />
                    <stop offset="100%" style={{ stopColor: '#bae6fd' }} />
                  </linearGradient>
                  <linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style={{ stopColor: '#1e40af' }} />
                    <stop offset="100%" style={{ stopColor: '#3b82f6' }} />
                  </linearGradient>
                  <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">

                </defs>
                <rect width="800" height="600" fill="url(#skyGrad)" />

          </div>
